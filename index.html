<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Báo Cáo Lỗi QC – Áo Thun</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Be Vietnam Pro', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 6px;
      color: #1a1a2e;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 28px;
      font-size: 15px;
    }

    /* ── CARD ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 28px;
    }

    .card h2 {
      margin-bottom: 16px;
      font-size: 17px;
      color: #444;
      border-bottom: 2px solid #e8e8e8;
      padding-bottom: 8px;
    }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 960px;
    }

    thead th {
      background: #1a1a2e;
      color: white;
      padding: 10px 6px;
      text-align: center;
      font-size: 13px;
      white-space: nowrap;
    }

    thead th.process-col {
      text-align: left;
      padding-left: 14px;
      min-width: 170px;
    }

    thead th.num-col { width: 36px; min-width: 36px; }

    thead th.total-col { background: #2c3e7a; min-width: 64px; }

    tbody tr:nth-child(even) { background: #f9f9f9; }
    tbody tr:hover { background: #eef2ff; }

    tbody td {
      padding: 7px 5px;
      font-size: 14px;
      border-bottom: 1px solid #eee;
      text-align: center;
    }

    tbody td.process-name {
      text-align: left;
      padding-left: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    tbody td.row-total {
      font-weight: bold;
      color: #4f6ef7;
      background: #f0f4ff;
    }

    tfoot td {
      padding: 10px 5px;
      font-size: 13px;
      text-align: center;
      font-weight: bold;
      border-top: 2px solid #1a1a2e;
      background: #f0f4ff;
      color: #1a1a2e;
    }

    tfoot td.col-label {
      text-align: left;
      padding-left: 14px;
      background: #1a1a2e;
      color: white;
    }

    tfoot td.grand-total {
      background: #1a1a2e;
      color: white;
    }

    input[type="number"] {
      width: 56px;
      padding: 5px 3px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      font-family: inherit;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #4f6ef7;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      margin-top: 18px;
      padding: 14px 16px;
      background: #f8f9ff;
      border-radius: 8px;
      border: 1px solid #e0e4f8;
      font-size: 13px;
      color: #555;
    }

    .legend span b { color: #1a1a2e; }

    /* ── BUTTONS ── */
    .btn {
      display: block;
      margin: 24px auto 0;
      padding: 14px 50px;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #3a56d4; }

    .reset-btn {
      display: block;
      margin: 24px auto 0;
      padding: 12px 36px;
      background: white;
      color: #e74c3c;
      border: 2px solid #e74c3c;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover { background: #e74c3c; color: white; }

    /* ── DASHBOARD ── */
    .dashboard { display: none; }

    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      min-width: 150px;
      background: white;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stat-box .number { font-size: 38px; font-weight: bold; color: #4f6ef7; }
    .stat-box .label  { font-size: 13px; color: #888; margin-top: 6px; line-height: 1.5; }
    .stat-box.red    .number { color: #e74c3c; }
    .stat-box.green  .number { color: #27ae60; }
    .stat-box.orange .number { color: #e67e22; }

    .charts-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .chart-card {
      flex: 1;
      min-width: 300px;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .chart-card h2 {
      margin-bottom: 16px;
      font-size: 15px;
      color: #444;
    }

    /* ── REPORT TABLE ── */
    .report-table-wrap { overflow-x: auto; }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 960px;
      font-size: 13px;
    }

    .report-table thead th {
      background: #1a1a2e;
      color: white;
      padding: 10px 7px;
      text-align: center;
      white-space: nowrap;
    }

    .report-table thead th.process-col {
      text-align: left;
      padding-left: 14px;
      min-width: 170px;
    }

    .report-table thead th.total-col { background: #2c3e7a; }

    .report-table tbody td {
      padding: 8px 6px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .report-table tbody td.process-name {
      text-align: left;
      padding-left: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .report-table tbody td.has-error {
      background: #fff0f0;
      color: #c0392b;
      font-weight: bold;
    }

    .report-table tbody td.row-total {
      background: #f0f4ff;
      font-weight: bold;
      color: #4f6ef7;
    }

    .report-table tfoot td {
      padding: 10px 6px;
      font-weight: bold;
      text-align: center;
      border-top: 2px solid #1a1a2e;
      background: #f0f4ff;
      color: #1a1a2e;
    }

    .report-table tfoot td.col-label {
      text-align: left;
      padding-left: 14px;
      background: #1a1a2e;
      color: white;
    }

    .report-table tfoot td.grand-total {
      background: #1a1a2e;
      color: white;
    }
  </style>
</head>
<body>

  <h1>📋 Báo Cáo Lỗi QC – Áo Thun</h1>
  <p class="subtitle">Nhập số lỗi theo từng công đoạn và loại lỗi, sau đó bấm <strong>Gửi Báo Cáo</strong></p>

  <!-- INPUT SECTION -->
  <div class="card" id="inputSection">
    <h2>Phiếu Nhập Lỗi – Quy Trình Sản Xuất Áo Thun</h2>
    <div class="table-wrap">
      <table>
        <thead id="inputHead"></thead>
        <tbody id="inputBody"></tbody>
        <tfoot id="inputFoot"></tfoot>
      </table>
    </div>
    <div class="legend" id="defectLegend"></div>
    <button class="btn" onclick="guiBaoCao()">✅ Gửi Báo Cáo</button>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="stats-row" id="statsRow"></div>

    <div class="charts-row">
      <div class="chart-card">
        <h2>📊 Tổng Lỗi Theo Công Đoạn</h2>
        <canvas id="barProcess"></canvas>
      </div>
      <div class="chart-card">
        <h2>📊 Tổng Lỗi Theo Loại Lỗi</h2>
        <canvas id="barDefect"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>📋 Bảng Tổng Hợp Chi Tiết</h2>
      <div class="report-table-wrap">
        <table class="report-table" id="reportTable"></table>
      </div>
    </div>

    <button class="reset-btn" onclick="nhapLai()">← Nhập Báo Cáo Mới</button>
  </div>

<script>
  const congDoan = [
    "Cắt vải",
    "May cổ áo",
    "Ghép vai",
    "May tay áo",
    "Ráp tay vào thân",
    "May sườn",
    "Lai gấu",
    "Đính nhãn / Tag",
    "Kiểm tra & Ủi",
    "Đóng gói"
  ];

  const loaiLoi = [
    "Lỗi đường may",
    "Lệch đường may",
    "Nhăn / Rúm",
    "Hở mũi chỉ",
    "Chỉ thừa",
    "Bỏ sót mũi may",
    "Vải bị hỏng",
    "Lỗi màu sắc",
    "Kích thước sai",
    "Hàng bẩn"
  ];

  const mauSac = [
    "#4f6ef7","#e74c3c","#27ae60","#e67e22","#9b59b6",
    "#1abc9c","#f39c12","#2980b9","#e91e63","#00bcd4"
  ];

  // ── Build input table header ──
  let thRow = `<tr>
    <th class="num-col">#</th>
    <th class="process-col">Công Đoạn</th>`;
  loaiLoi.forEach((name, j) => {
    thRow += `<th title="${name}">L${j + 1}</th>`;
  });
  thRow += `<th class="total-col">Tổng</th></tr>`;
  document.getElementById("inputHead").innerHTML = thRow;

  // ── Build input table body ──
  const tbody = document.getElementById("inputBody");
  congDoan.forEach((cd, i) => {
    let row = `<tr>
      <td>${i + 1}</td>
      <td class="process-name">${cd}</td>`;
    loaiLoi.forEach((_, j) => {
      row += `<td><input type="number" id="inp_${i}_${j}" min="0" value="0" oninput="updateTotals()" /></td>`;
    });
    row += `<td class="row-total" id="rt_${i}">0</td></tr>`;
    tbody.innerHTML += row;
  });

  // ── Build input table footer ──
  let ftRow = `<tr><td class="col-label" colspan="2">Tổng Cộng</td>`;
  loaiLoi.forEach((_, j) => { ftRow += `<td id="ct_${j}">0</td>`; });
  ftRow += `<td class="grand-total" id="grandTotal">0</td></tr>`;
  document.getElementById("inputFoot").innerHTML = ftRow;

  // ── Build defect legend ──
  const legend = document.getElementById("defectLegend");
  loaiLoi.forEach((name, j) => {
    legend.innerHTML += `<span><b>L${j + 1}</b>: ${name}</span>`;
  });

  // ── Helpers ──
  function getData() {
    return congDoan.map((_, i) =>
      loaiLoi.map((_, j) => parseInt(document.getElementById(`inp_${i}_${j}`).value) || 0)
    );
  }

  function updateTotals() {
    const data = getData();
    let grand = 0;
    data.forEach((row, i) => {
      const rowSum = row.reduce((a, b) => a + b, 0);
      document.getElementById(`rt_${i}`).textContent = rowSum;
    });
    loaiLoi.forEach((_, j) => {
      const colSum = data.reduce((a, row) => a + row[j], 0);
      document.getElementById(`ct_${j}`).textContent = colSum;
      grand += colSum;
    });
    document.getElementById("grandTotal").textContent = grand;
  }

  // ── Charts ──
  let chartProcess, chartDefect;

  function guiBaoCao() {
    const data    = getData();
    const rowTots = data.map(row => row.reduce((a, b) => a + b, 0));
    const colTots = loaiLoi.map((_, j) => data.reduce((a, row) => a + row[j], 0));
    const grand   = rowTots.reduce((a, b) => a + b, 0);

    const worstProcIdx   = rowTots.indexOf(Math.max(...rowTots));
    const worstDefectIdx = colTots.indexOf(Math.max(...colTots));
    const cleanProcs     = rowTots.filter(t => t === 0).length;

    // Stats
    document.getElementById("statsRow").innerHTML = `
      <div class="stat-box red">
        <div class="number">${grand}</div>
        <div class="label">Tổng Số Lỗi</div>
      </div>
      <div class="stat-box orange">
        <div class="number">${rowTots[worstProcIdx]}</div>
        <div class="label">Công Đoạn Nhiều Lỗi Nhất<br/><strong>${congDoan[worstProcIdx]}</strong></div>
      </div>
      <div class="stat-box">
        <div class="number">${colTots[worstDefectIdx]}</div>
        <div class="label">Loại Lỗi Nhiều Nhất<br/><strong>${loaiLoi[worstDefectIdx]}</strong></div>
      </div>
      <div class="stat-box green">
        <div class="number">${cleanProcs}</div>
        <div class="label">Công Đoạn Không Có Lỗi</div>
      </div>
    `;

    // Chart by process
    if (chartProcess) chartProcess.destroy();
    chartProcess = new Chart(document.getElementById("barProcess"), {
      type: "bar",
      data: {
        labels: congDoan,
        datasets: [{ label: "Số lỗi", data: rowTots, backgroundColor: mauSac, borderRadius: 6 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } },
          x: { ticks: { font: { size: 11 } } }
        }
      }
    });

    // Chart by defect type
    if (chartDefect) chartDefect.destroy();
    chartDefect = new Chart(document.getElementById("barDefect"), {
      type: "bar",
      data: {
        labels: loaiLoi,
        datasets: [{ label: "Số lỗi", data: colTots, backgroundColor: mauSac, borderRadius: 6 }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } },
          x: { ticks: { font: { size: 11 } } }
        }
      }
    });

    // Summary report table
    let rt = `<thead><tr>
      <th class="process-col">Công Đoạn</th>`;
    loaiLoi.forEach(l => { rt += `<th>${l}</th>`; });
    rt += `<th class="total-col">Tổng</th></tr></thead><tbody>`;

    congDoan.forEach((cd, i) => {
      rt += `<tr><td class="process-name">${i + 1}. ${cd}</td>`;
      data[i].forEach(val => {
        rt += `<td class="${val > 0 ? 'has-error' : ''}">${val > 0 ? val : '–'}</td>`;
      });
      rt += `<td class="row-total">${rowTots[i]}</td></tr>`;
    });

    rt += `</tbody><tfoot><tr><td class="col-label">Tổng Cộng</td>`;
    colTots.forEach(ct => { rt += `<td>${ct}</td>`; });
    rt += `<td class="grand-total">${grand}</td></tr></tfoot>`;
    document.getElementById("reportTable").innerHTML = rt;

    document.getElementById("inputSection").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    window.scrollTo(0, 0);
  }

  function nhapLai() {
    congDoan.forEach((_, i) => {
      loaiLoi.forEach((_, j) => { document.getElementById(`inp_${i}_${j}`).value = 0; });
      document.getElementById(`rt_${i}`).textContent = 0;
    });
    loaiLoi.forEach((_, j) => { document.getElementById(`ct_${j}`).textContent = 0; });
    document.getElementById("grandTotal").textContent = 0;
    document.getElementById("inputSection").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
